apiVersion: apps/v1
kind: Deployment
metadata:
  name: patients
  namespace: dev
  labels:
    app: patients
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patients
  template:
    metadata:
      labels:
        app: patients
    spec:
      containers:
      - name: patients
        image: 303670280087.dkr.ecr.us-east-1.amazonaws.com/patients:latest
        ports:
        - containerPort: 3000

---

apiVersion: v1
kind: Service
metadata:
  name: patients
  namespace: dev
spec:
  selector:
    app: patients
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP